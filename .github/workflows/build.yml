name: Build Images

on:
  push:
    branches: [main]
    paths: ['images/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image: [ubuntu-24.04, debian-12, rocky-9]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # debootstrap for Debian/Ubuntu, dnf for Rocky
          sudo apt-get install -y debootstrap dnf

      - name: Read image metadata
        id: meta
        run: |
          META="images/${{ matrix.image }}/image.json"
          echo "type=$(jq -r .type "$META")" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          cd images/${{ matrix.image }}
          chmod +x build.sh
          sudo ./build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image }}-${{ steps.meta.outputs.type }}-amd64
          path: images/${{ matrix.image }}/${{ matrix.image }}-${{ steps.meta.outputs.type }}-amd64.tar.gz

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Generate manifest
        run: |
          echo '{"version":1,"images":[' > manifest.json
          first=true
          for meta in images/*/image.json; do
            image_dir=$(dirname "$meta")
            image_name=$(basename "$image_dir")
            type=$(jq -r .type "$meta")
            description=$(jq -r .description "$meta")
            logo=$(jq -r .logo "$meta")

            # Detect available architectures and sizes from built artifacts
            sizes="{}"
            for artifact_dir in ${image_name}-${type}-*/; do
              arch=$(echo "$artifact_dir" | sed "s/${image_name}-${type}-//;s|/||")
              tarball=$(find "$artifact_dir" -name "*.tar.gz" | head -1)
              if [ -n "$tarball" ]; then
                size=$(stat --format="%s" "$tarball")
                sizes=$(echo "$sizes" | jq --arg arch "$arch" --argjson size "$size" '. + {($arch): $size}')
              fi
            done
            archs=$(echo "$sizes" | jq '[keys[]]')

            if [ "$first" = true ]; then first=false; else echo ',' >> manifest.json; fi
            jq -n \
              --arg name "$image_name" \
              --arg type "$type" \
              --argjson arch "$archs" \
              --argjson sizes "$sizes" \
              --arg description "$description" \
              --arg logo "$logo" \
              '{name:$name,type:$type,arch:$arch,sizes:$sizes,description:$description,logo:$logo}' >> manifest.json
          done
          echo ']}' >> manifest.json
          cat manifest.json

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Images
          files: |
            manifest.json
            **/*.tar.gz
          make_latest: true
