name: Build Images

on:
  push:
    branches: [main]
    paths: ['images/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        image: [ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          cd images/${{ matrix.image }}
          chmod +x build.sh
          sudo ./build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image }}-amd64
          path: images/${{ matrix.image }}/${{ matrix.image }}-amd64.tar.gz

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Images
          files: |
            **/*.tar.gz
          make_latest: true
